<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Messagebit</title>

        <style>
            body {
                background-color: rgb(45, 115, 196);
            }

            h2{
               display:block;
                width:400px;
                margin:24px auto;
                padding:14px;
                background:lightblue;
                color:black;
                text-decoration:none;
                border-radius:6px;
                font-weight:bold;
                font-size:60px;
                transition:0.2s;
                box-shadow:0 0 15px rgba(0,0,0,0.5);
                text-align:center;
            }
            

            input {
                 display:block;
                width:260px;
                margin:12px auto;
                padding:14px;
                background:gold;
                color:black;
                text-decoration:none;
                border-radius:12px;
                font-weight:bold;
                font-size:20px;
                transition:0.2s;
                box-shadow:0 0 15px rgba(0,0,0,0.5);
                text-align:center;

            }

            button {
                display:block;
                width:280px;
                margin:12px auto;
                padding:14px;
                background:gold;
                color:black;
                text-decoration:none;
                border-radius:12px;
                font-weight:bold;
                font-size:20px;
                transition:0.2s;
                box-shadow:0 0 15px rgba(0,0,0,0.5);
                text-align:center;
            }

            button.connect {
                display:block;
                width:290px;
                margin:12px auto;
                padding:14px;
                background:lightblue;
                color:black;
                text-decoration:none;
                border-radius:12px;
                font-weight:bold;
                font-size:20px;
                transition:0.2s;
                box-shadow:0 0 15px rgba(0,0,0,0.5);
                text-align:center;
            }

             button:hover{
            transform:scale(1.06);
        }

        </style>
    </head>
    <body>

<h2>Messagebit</h2>

<button class="connect" onclick="connect()">Connect to Micro:bit via USB</button>
<br><br>

<input id="text" type="text" placeholder="Your Message">
<button onclick="send()">Send</button>

<script>
let port;
let writer;

async function connect() {
  if (!('serial' in navigator)) {
    alert('Web Serial is not supported in this browser. Use Chrome or Edge.');
    return;
  }

  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    writer = port.writable.getWriter();
    alert('Connected to Micro:bit');
  } catch (err) {
    console.error(err);
    alert('Connection failed: ' + (err.message || err));
  }
}

async function send() {
  if (!writer) {
    alert('Connect to the Micro:bit first.');
    return;
  }

  const msg = document.getElementById('text').value.trim();
  if (!msg) {
    alert('Please type a message first.');
    return;
  }

  try {
    await writer.write(new TextEncoder().encode(msg + '\n'));
  } catch (err) {
    console.error(err);
    alert('Send failed: ' + (err.message || err));
  }
}
</script>
</body>
</html>
