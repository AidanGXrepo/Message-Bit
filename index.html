<!DOCTYPE html>
<html>
    <head>
        <title>Messagebit</title>

        <style>
            body {
                background-color: rgb(45, 115, 196);
            }

            h2{
               display:block;
                width:400px;
                margin:24px auto;
                padding:14px;
                background:lightblue;
                color:black;
                text-decoration:none;
                border-radius:6px;
                font-weight:bold;
                font-size:60px;
                transition:0.2s;
                box-shadow:0 0 15px rgba(0,0,0,0.5);
                text-align:center;
            }
            

            input {
                 display:block;
                width:260px;
                margin:12px auto;
                padding:14px;
                background:gold;
                color:black;
                text-decoration:none;
                border-radius:12px;
                font-weight:bold;
                font-size:20px;
                transition:0.2s;
                box-shadow:0 0 15px rgba(0,0,0,0.5);
                text-align:center;

            }

            button {
                display:block;
                width:280px;
                margin:12px auto;
                padding:14px;
                background:gold;
                color:black;
                text-decoration:none;
                border-radius:12px;
                font-weight:bold;
                font-size:20px;
                transition:0.2s;
                box-shadow:0 0 15px rgba(0,0,0,0.5);
                text-align:center;
            }

            button.connect {
                display:block;
                width:290px;
                margin:12px auto;
                padding:14px;
                background:lightblue;
                color:black;
                text-decoration:none;
                border-radius:12px;
                font-weight:bold;
                font-size:20px;
                transition:0.2s;
                box-shadow:0 0 15px rgba(0,0,0,0.5);
                text-align:center;
            }

             button:hover{
            transform:scale(1.06);
        }

        </style>
<body>

<h2>Messagebit</h2>

<button class=connect onclick="connect()">Connect to Micro:bit via USB</button>
<br><br>

<input type="text" placeholder="Your Message">
<button onclick="send()">Send</button>

<script>
let port;
let writer;

async function connect() {
  port = await navigator.serial.requestPort();
  await port.open({ baudRate: 115200 });
  writer = port.writable.getWriter();
  alert("connected");
}

async function send() {
  let msg = document.getElementById("text").value;
  await writer.write(new TextEncoder().encode(msg + "\n"));
}
</script>
</body>
</html>
